blueprint:
  name: ZEN35 Scene Dimmer – LED State Sync
  description: >
    Companion to "ZEN35 Scene Dimmer – Light Control with LED Sync".
    Watches the controlled light for state changes from any source and updates
    the corresponding ZEN35 button LED brightness to match.

    Run this alongside the main blueprint — one instance per button/light pair.

  domain: automation
  input:
    zen35_device_id:
      name: ZEN35 Device
      description: Select your ZEN35 device.
      selector:
        device:
          integration: zwave_js

    led_brightness_parameter:
      name: LED Brightness Parameter
      description: >
        Must match the value used in the main blueprint.
        Button 1 = 12, Button 2 = 13, Button 3 = 14, Button 4 = 15,
        Main dimmer = 11.
      default: "12"
      selector:
        select:
          options:
            - label: "Button 1 (param 12)"
              value: "12"
            - label: "Button 2 (param 13)"
              value: "13"
            - label: "Button 3 (param 14)"
              value: "14"
            - label: "Button 4 (param 15)"
              value: "15"
            - label: "Main dimmer (param 11)"
              value: "11"

    target_light:
      name: Light to Watch
      description: Must match the light used in the main blueprint.
      selector:
        entity:
          domain: light

    led_brightness_on:
      name: LED Brightness When Light is ON
      description: ZEN35 LED brightness level (1–10) when the light is on.
      default: 10
      selector:
        number:
          min: 1
          max: 10
          step: 1

    led_brightness_off:
      name: LED Brightness When Light is OFF
      description: ZEN35 LED brightness level (1–10) when the light is off.
      default: 1
      selector:
        number:
          min: 1
          max: 10
          step: 1

trigger:
  - platform: state
    entity_id: !input target_light

variables:
  param: !input led_brightness_parameter
  br_on: !input led_brightness_on
  br_off: !input led_brightness_off

action:
  - choose:
      - conditions:
          - condition: state
            entity_id: !input target_light
            state: "on"
        sequence:
          - action: zwave_js.set_config_parameter
            data:
              parameter: "{{ param }}"
              value: "{{ br_on }}"
            target:
              device_id: !input zen35_device_id

      - conditions:
          - condition: state
            entity_id: !input target_light
            state: "off"
        sequence:
          - action: zwave_js.set_config_parameter
            data:
              parameter: "{{ param }}"
              value: "{{ br_off }}"
            target:
              device_id: !input zen35_device_id

mode: queued
max: 5
